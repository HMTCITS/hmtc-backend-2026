name: Build and publish Docker image to GHCR

on:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Docker tags
        id: tags
        run: |
          image_name="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          echo "${image_name}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "${image_name}:latest" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_name }}" = "dev" ]; then
            echo "${image_name}:staging" >> "$GITHUB_OUTPUT"
          fi
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref_name == 'main' || github.ref_name == 'dev'

    steps:
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.5.3
        with:
          ssh-private-key: ${{ secrets.DEPLOY_PRIVATE_KEY }}

      - name: Add host to known_hosts
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy to VPS (main)
        if: github.ref_name == 'main'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          echo "=== DEPLOY MAIN (PRODUCTION) ==="
          echo "Target host: $DEPLOY_HOST"

          ssh \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o ConnectTimeout=60 \
            "$DEPLOY_USER"@"$DEPLOY_HOST" '
              set -e
              cd ../../data/hmtc-deployment
              docker compose -p hmtc-prod --env-file .env.prod -f docker-compose.prod.yml pull
              docker compose -p hmtc-prod --env-file .env.prod -f docker-compose.prod.yml up -d
            '

          echo "Main deploy finished."

      - name: Deploy to VPS (dev)
        if: github.ref_name == 'dev'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          echo "=== DEPLOY DEV ==="
          echo "Target host: $DEPLOY_HOST"

          ssh \
            -o StrictHostKeyChecking=no \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -o ConnectTimeout=60 \
            "$DEPLOY_USER"@"$DEPLOY_HOST" '
              set -e
              cd ../../data/hmtc-deployment
              docker compose -p hmtc-staging --env-file .env.staging -f docker-compose.staging.yml pull
              docker compose -p hmtc-staging --env-file .env.staging -f docker-compose.staging.yml up -d
            '

          echo "Staging deploy finished."

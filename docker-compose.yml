version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ghcr.io/hmtc/hmtc-backend-2026-backend:latest
    container_name: backend-hmtc
    ports:
      - "8080:8080"
    depends_on:
      - db
    env_file:
      - .env
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: postgres-db-hmtc
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
